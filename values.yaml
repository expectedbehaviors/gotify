# Baseline Gotify. Override TZ, ingress host, and TLS secret in your values.
gotify:
  global:
    fullnameOverride: gotify
  defaultPodOptions:
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"
  controllers:
    main:
      enabled: true
      type: deployment
      replicas: 1
      containers:
        main:
          image:
            repository: gotify/server
            tag: "v2.4.4"
            pullPolicy: IfNotPresent
          env:
            TZ: UTC
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: 80
                initialDelaySeconds: 15
                periodSeconds: 15
                timeoutSeconds: 3
                failureThreshold: 3
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: 80
                initialDelaySeconds: 5
                periodSeconds: 10
                timeoutSeconds: 2
                failureThreshold: 3
            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: 80
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 2
                failureThreshold: 15
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
  service:
    main:
      enabled: true
      controller: main
      primary: true
      ports:
        http:
          enabled: true
          primary: true
          port: 80
          protocol: HTTP
  ingress:
    main:
      enabled: true
      annotations: {}
      hosts:
        - host: gotify.example.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - gotify.example.com
          secretName: gotify-tls
  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      storageClass: ""
      size: 1Gi
      globalMounts:
        - path: /app/data
          readOnly: false

# 1Password: optional. If you need secrets (e.g. custom config), enable and add items.
# Subchart: expectedbehaviors/OnePasswordItem-helm. Secrets are created in the release namespace.
onepassworditem:
  enabled: true
  items: []
